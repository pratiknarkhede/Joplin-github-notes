site_name: Joplin Notes
site_description: Personal knowledge base exported from Joplin
site_author: pratiknarkhede

repo_url: https://github.com/pratiknarkhede/Joplin-github-notes
repo_name: Joplin-github-notes

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search
  - awesome-pages

